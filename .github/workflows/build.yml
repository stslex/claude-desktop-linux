name: Build Claude Desktop Linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Claude Desktop version to build (blank = auto-detect)'
        required: false
      release:
        description: 'Upload to GitHub Releases'
        type: boolean
        default: false
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['dev', 'main']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR:  /tmp/claude-build
      OUTPUT_DIR: ${{ github.workspace }}/output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dmg2img p7zip-full rpm imagemagick fuse libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        if: hashFiles('package-lock.json') != ''
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      # -----------------------------------------------------------------------
      # Build pipeline
      # -----------------------------------------------------------------------
      - name: fetch-and-extract
        run: bash scripts/fetch-and-extract.sh

      - name: Read version
        id: ver
        run: |
          echo "version=$(cat "$BUILD_DIR/VERSION")"         >> "$GITHUB_OUTPUT"
          echo "electron=$(cat "$BUILD_DIR/ELECTRON_VERSION")" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/electron-cache
          key: electron-${{ steps.ver.outputs.electron }}

      - name: inject-stubs
        run: bash scripts/inject-stubs.sh

      - name: patch-cowork
        id: patch
        run: bash scripts/patch-cowork.sh

      - name: Upload patch logs on failure
        if: failure() && steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: patch-logs
          path: ${{ env.BUILD_DIR }}/patch-*.log
          if-no-files-found: warn

      - name: build-packages
        env:
          KEEP_BUILD_DIR: '1'   # preserve BUILD_DIR so electron-cache can be saved
        run: bash scripts/build-packages.sh

      # -----------------------------------------------------------------------
      # CI artifact (always — useful for dev/PR builds too)
      # -----------------------------------------------------------------------
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-${{ steps.ver.outputs.version }}
          path: output/
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # GitHub Release
      #   • push to main  → always release
      #   • workflow_dispatch with release=true  → release
      #   • push to dev / PR  → skip
      # -----------------------------------------------------------------------
      - name: Compute repack number and release tag
        id: repack
        if: >
          github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && inputs.release == true)
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION:  ${{ steps.ver.outputs.version }}
        run: |
          # Count existing repacks for this exact Claude version.
          REPACK=0
          EXISTING="$(gh release list --repo "${{ github.repository }}" \
            --limit 200 --json tagName --jq '.[].tagName' 2>/dev/null || true)"
          while IFS= read -r tag; do
            if [[ "$tag" =~ ^v${VERSION}-repack-([0-9]+)$ ]]; then
              N="${BASH_REMATCH[1]}"
              (( N + 1 > REPACK )) && REPACK=$(( N + 1 ))
            fi
          done <<< "$EXISTING"
          RELEASE_TAG="v${VERSION}-repack-${REPACK}"
          echo "num=${REPACK}"          >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}"     >> "$GITHUB_OUTPUT"
          echo "Computed release tag: ${RELEASE_TAG}"

      - name: Rename assets to include repack suffix
        if: steps.repack.outcome == 'success'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPACK:  ${{ steps.repack.outputs.num }}
        run: |
          for ext in rpm AppImage; do
            src="output/claude-desktop-${VERSION}-x86_64.${ext}"
            dst="output/claude-desktop-${VERSION}-repack-${REPACK}-x86_64.${ext}"
            [[ -f "$src" ]] || continue
            mv "$src" "$dst"
            sha256sum "$dst" | awk '{print $1}' > "${dst}.sha256"
            rm -f "${src}.sha256"
          done

      - name: Compute checksums for release notes
        id: sums
        if: steps.repack.outcome == 'success'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPACK:  ${{ steps.repack.outputs.num }}
        run: |
          BASE="output/claude-desktop-${VERSION}-repack-${REPACK}-x86_64"
          RPM_SHA="$(cat "${BASE}.rpm.sha256"       2>/dev/null || echo n/a)"
          AI_SHA="$(cat  "${BASE}.AppImage.sha256"  2>/dev/null || echo n/a)"
          echo "rpm=${RPM_SHA}"       >> "$GITHUB_OUTPUT"
          echo "appimage=${AI_SHA}"   >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.repack.outcome == 'success'
        env:
          GH_TOKEN:  ${{ github.token }}
          VERSION:   ${{ steps.ver.outputs.version }}
          ELECTRON:  ${{ steps.ver.outputs.electron }}
          REPACK:    ${{ steps.repack.outputs.num }}
          TAG:       ${{ steps.repack.outputs.tag }}
          RPM_SHA:   ${{ steps.sums.outputs.rpm }}
          AI_SHA:    ${{ steps.sums.outputs.appimage }}
        run: |
          BASE="output/claude-desktop-${VERSION}-repack-${REPACK}-x86_64"
          NOTES=$(cat <<'NOTES_EOF'
          ## Claude Desktop Linux v${VERSION} (repack-${REPACK})

          Unofficial Linux repackage of the official macOS Claude Desktop v${VERSION}.

          | Asset | SHA256 |
          |---|---|
          | RPM | `${RPM_SHA}` |
          | AppImage | `${AI_SHA}` |

          **Electron version (AppImage bundled / RPM required):** ${ELECTRON}

          > Built automatically from the official macOS DMG.
          > Claude Desktop is Anthropic's proprietary software.
          NOTES_EOF
          )
          # Expand only our known vars (prevents leaking runner env into notes).
          NOTES="$(echo "$NOTES" | envsubst '${VERSION} ${REPACK} ${RPM_SHA} ${AI_SHA} ${ELECTRON}')"

          # Build asset list — only include files that actually exist.
          ASSETS=()
          for f in "${BASE}.rpm" "${BASE}.rpm.sha256" \
                   "${BASE}.AppImage" "${BASE}.AppImage.sha256"; do
            [[ -f "$f" ]] && ASSETS+=("$f")
          done

          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "ERROR: no release assets found — nothing to upload." >&2
            exit 1
          fi

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "Claude Desktop Linux v${VERSION} (repack-${REPACK})" \
            --notes "$NOTES" \
            "${ASSETS[@]}"
