name: Build Claude Desktop Linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Claude Desktop version to build'
        required: false
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR:  /tmp/claude-build
      OUTPUT_DIR: ${{ github.workspace }}/output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dmg2img p7zip-full rpm rpm-build imagemagick fuse libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        if: hashFiles('package-lock.json') != ''
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      # -----------------------------------------------------------------------
      # Build pipeline
      # -----------------------------------------------------------------------
      - name: fetch-and-extract
        run: bash scripts/fetch-and-extract.sh

      - name: Read version
        id: ver
        run: |
          echo "version=$(cat $BUILD_DIR/VERSION)" >> "$GITHUB_OUTPUT"
          echo "electron=$(cat $BUILD_DIR/ELECTRON_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/electron-cache
          key: electron-${{ steps.ver.outputs.electron }}

      - name: inject-stubs
        run: bash scripts/inject-stubs.sh

      - name: patch-cowork
        id: patch
        run: bash scripts/patch-cowork.sh

      - name: Upload patch logs on failure
        if: failure() && steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: patch-logs
          path: ${{ env.BUILD_DIR }}/patch-*.log
          if-no-files-found: warn

      - name: build-packages
        env:
          KEEP_BUILD_DIR: '1'   # preserve BUILD_DIR so electron-cache can be saved above
        run: bash scripts/build-packages.sh

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-${{ steps.ver.outputs.version }}
          path: output/
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # GitHub Release (tag push or workflow_dispatch with explicit version)
      # -----------------------------------------------------------------------
      - name: Compute checksums for release body
        id: sums
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          RPM_SHA="$(cat output/claude-desktop-${VERSION}-x86_64.rpm.sha256       2>/dev/null || echo n/a)"
          AI_SHA="$(cat  output/claude-desktop-${VERSION}-x86_64.AppImage.sha256  2>/dev/null || echo n/a)"
          echo "rpm=$RPM_SHA"      >> "$GITHUB_OUTPUT"
          echo "appimage=$AI_SHA"  >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION:  ${{ steps.ver.outputs.version }}
          ELECTRON: ${{ steps.ver.outputs.electron }}
          RPM_SHA:  ${{ steps.sums.outputs.rpm }}
          AI_SHA:   ${{ steps.sums.outputs.appimage }}
        run: |
          NOTES=$(cat <<EOF
          ## Claude Desktop Linux v${VERSION}

          Unofficial Linux repackage of the official macOS Claude Desktop.

          | Asset | SHA256 |
          |---|---|
          | RPM | \`${RPM_SHA}\` |
          | AppImage | \`${AI_SHA}\` |

          **Electron version (AppImage bundled / RPM required):** ${ELECTRON}

          > This release was built automatically from the official macOS DMG.
          > Claude Desktop is Anthropic's proprietary software.
          EOF
          )

          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "Claude Desktop Linux v${VERSION}" \
            --notes "$NOTES" \
            output/claude-desktop-${VERSION}-x86_64.rpm \
            output/claude-desktop-${VERSION}-x86_64.rpm.sha256 \
            output/claude-desktop-${VERSION}-x86_64.AppImage \
            output/claude-desktop-${VERSION}-x86_64.AppImage.sha256 \
            2>/dev/null || \
          gh release edit "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --notes "$NOTES"
