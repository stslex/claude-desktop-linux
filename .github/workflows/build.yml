name: Build Claude Desktop Linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Claude Desktop version (leave empty to build latest)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed to create a GitHub Release

    env:
      BUILD_DIR:  /tmp/claude-build
      OUTPUT_DIR: ${{ github.workspace }}/output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Dependencies
      # -----------------------------------------------------------------------
      - name: Install apt dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dmg2img p7zip-full rpm bubblewrap curl unzip \
            imagemagick libmagickcore-dev

      - name: Install appimagetool
        run: |
          curl -sSL -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      # -----------------------------------------------------------------------
      # Build pipeline
      # -----------------------------------------------------------------------
      - name: Set SKIP_DOWNLOAD if version pinned
        if: ${{ inputs.version != '' }}
        run: echo "Version input: ${{ inputs.version }} (fetch-and-extract.sh will use latest unless DMG is pre-cached)"

      - name: fetch-and-extract
        run: bash scripts/fetch-and-extract.sh

      - name: Read version
        id: ver
        run: |
          echo "version=$(cat $BUILD_DIR/VERSION)" >> "$GITHUB_OUTPUT"
          echo "electron=$(cat $BUILD_DIR/ELECTRON_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: /tmp/claude-build/electron-cache
          key: electron-${{ steps.ver.outputs.electron }}

      - name: inject-stubs
        run: bash scripts/inject-stubs.sh

      - name: patch-cowork
        run: bash scripts/patch-cowork.sh

      - name: build-packages
        run: bash scripts/build-packages.sh

      # -----------------------------------------------------------------------
      # Upload build artifacts (always, even on failure, for debugging)
      # -----------------------------------------------------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-${{ steps.ver.outputs.version }}
          path: output/
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # GitHub Release
      # -----------------------------------------------------------------------
      - name: Compute checksums for release body
        id: sums
        run: |
          DMG_SHA="$(cat /tmp/claude-build/claude.dmg.sha256)"
          RPM_SHA="$(cat output/claude-desktop-${{ steps.ver.outputs.version }}-x86_64.rpm.sha256 2>/dev/null || echo n/a)"
          AI_SHA="$(cat  output/claude-desktop-${{ steps.ver.outputs.version }}-x86_64.AppImage.sha256 2>/dev/null || echo n/a)"
          echo "dmg=$DMG_SHA"  >> "$GITHUB_OUTPUT"
          echo "rpm=$RPM_SHA"  >> "$GITHUB_OUTPUT"
          echo "appimage=$AI_SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION:  ${{ steps.ver.outputs.version }}
          ELECTRON: ${{ steps.ver.outputs.electron }}
          DMG_SHA:  ${{ steps.sums.outputs.dmg }}
          RPM_SHA:  ${{ steps.sums.outputs.rpm }}
          AI_SHA:   ${{ steps.sums.outputs.appimage }}
        run: |
          NOTES=$(cat <<EOF
          ## Claude Desktop Linux v${VERSION}

          Unofficial Linux repackage of the official macOS Claude Desktop.

          | Asset | SHA256 |
          |---|---|
          | Source DMG | \`${DMG_SHA}\` |
          | RPM | \`${RPM_SHA}\` |
          | AppImage | \`${AI_SHA}\` |

          **Electron version (AppImage bundled / RPM required):** ${ELECTRON}

          > This release was built automatically from the official macOS DMG.
          > Claude Desktop is Anthropic's proprietary software.
          EOF
          )

          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "Claude Desktop Linux v${VERSION}" \
            --notes "$NOTES" \
            output/claude-desktop-${VERSION}-x86_64.rpm \
            output/claude-desktop-${VERSION}-x86_64.rpm.sha256 \
            output/claude-desktop-${VERSION}-x86_64.AppImage \
            output/claude-desktop-${VERSION}-x86_64.AppImage.sha256 \
            2>/dev/null || \
          gh release edit "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --notes "$NOTES"
