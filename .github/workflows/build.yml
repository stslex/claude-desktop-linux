name: Build Claude Desktop Linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Claude Desktop version to build (blank = auto-detect)'
        required: false
      release:
        description: 'Upload to GitHub Releases'
        type: boolean
        default: false
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['dev', 'main']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR:  /tmp/claude-build
      OUTPUT_DIR: ${{ github.workspace }}/output

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dmg2img p7zip-full rpm imagemagick icnsutils fuse libfuse2 zsync createrepo-c

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        if: hashFiles('package-lock.json') != ''
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      # -----------------------------------------------------------------------
      # Build pipeline
      # -----------------------------------------------------------------------
      - name: fetch-and-extract
        run: bash scripts/fetch-and-extract.sh

      - name: Read version
        id: ver
        run: |
          echo "version=$(cat "$BUILD_DIR/VERSION")"         >> "$GITHUB_OUTPUT"
          echo "electron=$(cat "$BUILD_DIR/ELECTRON_VERSION")" >> "$GITHUB_OUTPUT"

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/electron-cache
          key: electron-${{ steps.ver.outputs.electron }}

      - name: inject-stubs
        run: bash scripts/inject-stubs.sh

      - name: patch-cowork
        id: patch
        run: bash scripts/patch-cowork.sh

      - name: Upload patch logs on failure
        if: failure() && steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: patch-logs
          path: ${{ env.BUILD_DIR }}/patch-*.log
          if-no-files-found: warn

      - name: Compute repack number
        id: repack
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION:  ${{ steps.ver.outputs.version }}
        run: |
          # Count existing repacks for this exact Claude version.
          REPACK=0
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.release }}" == "true" ]]; then
            EXISTING="$(gh release list --repo "${{ github.repository }}" \
              --limit 200 --json tagName --jq '.[].tagName' 2>/dev/null || true)"
            while IFS= read -r tag; do
              if [[ "$tag" =~ ^v${VERSION}-repack-([0-9]+)$ ]]; then
                N="${BASH_REMATCH[1]}"
                (( N + 1 > REPACK )) && REPACK=$(( N + 1 ))
              fi
            done <<< "$EXISTING"
          fi
          echo "num=${REPACK}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-repack-${REPACK}" >> "$GITHUB_OUTPUT"
          echo "Computed repack number: ${REPACK}"

      - name: build-packages
        env:
          KEEP_BUILD_DIR: '1'   # preserve BUILD_DIR so electron-cache can be saved
          REPACK_NUM: ${{ steps.repack.outputs.num }}
        run: bash scripts/build-packages.sh

      # -----------------------------------------------------------------------
      # CI artifact (always — useful for dev/PR builds too)
      # -----------------------------------------------------------------------
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-${{ steps.ver.outputs.version }}
          path: output/
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # GitHub Release
      #   • push to main  → always release
      #   • workflow_dispatch with release=true  → release
      #   • push to dev / PR  → skip
      # -----------------------------------------------------------------------
      - name: Rename assets to include repack suffix
        if: >
          github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && inputs.release == true)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPACK:  ${{ steps.repack.outputs.num }}
        run: |
          for ext in rpm AppImage; do
            src="output/claude-desktop-${VERSION}-x86_64.${ext}"
            dst="output/claude-desktop-${VERSION}-repack-${REPACK}-x86_64.${ext}"
            [[ -f "$src" ]] || continue
            mv "$src" "$dst"
            sha256sum "$dst" | awk '{print $1}' > "${dst}.sha256"
            rm -f "${src}.sha256"
          done
          # Remove the stale zsync (it has the wrong embedded filename) and
          # regenerate it from the renamed AppImage so the internal URL matches.
          rm -f "output/claude-desktop-${VERSION}-x86_64.AppImage.zsync"
          APPIMAGE="output/claude-desktop-${VERSION}-repack-${REPACK}-x86_64.AppImage"
          ZSYNC="output/claude-desktop-${VERSION}-repack-${REPACK}-x86_64.AppImage.zsync"
          if [[ -f "$APPIMAGE" ]] && command -v zsyncmake &>/dev/null; then
            zsyncmake -u "$(basename "$APPIMAGE")" -o "$ZSYNC" "$APPIMAGE"
          fi

      - name: Compute checksums for release notes
        id: sums
        if: >
          github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && inputs.release == true)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPACK:  ${{ steps.repack.outputs.num }}
        run: |
          BASE="output/claude-desktop-${VERSION}-repack-${REPACK}-x86_64"
          RPM_SHA="$(cat "${BASE}.rpm.sha256"       2>/dev/null || echo n/a)"
          AI_SHA="$(cat  "${BASE}.AppImage.sha256"  2>/dev/null || echo n/a)"
          echo "rpm=${RPM_SHA}"       >> "$GITHUB_OUTPUT"
          echo "appimage=${AI_SHA}"   >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: >
          github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && inputs.release == true)
        env:
          GH_TOKEN:  ${{ github.token }}
          VERSION:   ${{ steps.ver.outputs.version }}
          ELECTRON:  ${{ steps.ver.outputs.electron }}
          REPACK:    ${{ steps.repack.outputs.num }}
          TAG:       ${{ steps.repack.outputs.tag }}
          RPM_SHA:   ${{ steps.sums.outputs.rpm }}
          AI_SHA:    ${{ steps.sums.outputs.appimage }}
        run: |
          BASE="output/claude-desktop-${VERSION}-repack-${REPACK}-x86_64"
          NOTES=$(cat <<'NOTES_EOF'
          ## Claude Desktop Linux v${VERSION} (repack-${REPACK})

          Unofficial Linux repackage of the official macOS Claude Desktop v${VERSION}.

          | Asset | SHA256 |
          |---|---|
          | RPM | `${RPM_SHA}` |
          | AppImage | `${AI_SHA}` |

          **Electron version (AppImage bundled / RPM required):** ${ELECTRON}

          > Built automatically from the official macOS DMG.
          > Claude Desktop is Anthropic's proprietary software.
          NOTES_EOF
          )
          # Expand only our known vars (prevents leaking runner env into notes).
          NOTES="$(echo "$NOTES" | envsubst '${VERSION} ${REPACK} ${RPM_SHA} ${AI_SHA} ${ELECTRON}')"

          # Build asset list — only include files that actually exist.
          ASSETS=()
          for f in "${BASE}.rpm" "${BASE}.rpm.sha256" \
                   "${BASE}.AppImage" "${BASE}.AppImage.sha256" \
                   "${BASE}.AppImage.zsync"; do
            [[ -f "$f" ]] && ASSETS+=("$f")
          done

          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "ERROR: no release assets found — nothing to upload." >&2
            exit 1
          fi

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "Claude Desktop Linux v${VERSION} (repack-${REPACK})" \
            --notes "$NOTES" \
            "${ASSETS[@]}"

      # -----------------------------------------------------------------------
      # DNF / RPM repository on GitHub Pages
      #   Keeps the latest repack per Claude version; older repacks are pruned.
      #   Users add the repo once via the .repo file at the Pages URL.
      # -----------------------------------------------------------------------
      - name: Update DNF repository on GitHub Pages
        if: >
          github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && inputs.release == true)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPACK:  ${{ steps.repack.outputs.num }}
          TAG:     ${{ steps.repack.outputs.tag }}
        run: |
          REPO_USER="${GITHUB_REPOSITORY%%/*}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          PAGES_URL="https://${REPO_USER}.github.io/${REPO_NAME}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check out or create the gh-pages branch in a worktree.
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages
            git -C /tmp/gh-pages commit --allow-empty -m "Initialize gh-pages"
          fi

          # Disable Jekyll so GitHub Pages serves files as-is (no HTML wrapping).
          touch /tmp/gh-pages/.nojekyll

          # Generate repo metadata in a staging directory.
          # The RPM itself is NOT stored in gh-pages (exceeds GitHub's 100 MB
          # file-size limit).  Instead, --location-prefix tells dnf to fetch
          # the package from the GitHub Releases download URL.
          STAGING_DIR="$(mktemp -d)"
          RPM_SRC="output/claude-desktop-${VERSION}-repack-${REPACK}-x86_64.rpm"
          cp "$RPM_SRC" "$STAGING_DIR/"

          DOWNLOAD_PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          createrepo_c --location-prefix "$DOWNLOAD_PREFIX" "$STAGING_DIR"

          # Copy only repodata to gh-pages (not the RPM binary).
          RPM_DIR=/tmp/gh-pages/rpm
          mkdir -p "$RPM_DIR"
          rm -rf "$RPM_DIR/repodata"
          cp -a "$STAGING_DIR/repodata" "$RPM_DIR/"
          rm -rf "$STAGING_DIR"

          # Remove any RPM binaries left over from before this fix.
          find "$RPM_DIR" -name "*.rpm" -delete

          # Write a stable .repo file consumers can curl-install.
          cat > /tmp/gh-pages/claude-desktop.repo <<REPO_EOF
          [claude-desktop]
          name=Claude Desktop Linux (unofficial)
          baseurl=${PAGES_URL}/rpm/
          enabled=1
          gpgcheck=0
          REPO_EOF

          # Commit only if something changed.
          git -C /tmp/gh-pages add -A
          if git -C /tmp/gh-pages diff --cached --quiet; then
            echo "gh-pages: no changes."
          else
            git -C /tmp/gh-pages commit \
              -m "rpm-repo: claude-desktop ${VERSION}-repack-${REPACK}"
            git -C /tmp/gh-pages push origin HEAD:gh-pages
          fi
