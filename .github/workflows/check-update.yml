name: Check for Claude Desktop Update

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write          # needed to trigger build.yml via workflow_dispatch

    steps:
      - name: Resolve latest DMG version
        id: version
        run: |
          LATEST_URL="https://storage.googleapis.com/osprey-downloads-c02f6a0d-347c-492b-a752-3e0651722e97/nest-apple/Claude-latest.dmg"
          # Follow the redirect to get the versioned filename.
          RESOLVED="$(curl -sSL --head -o /dev/null -w '%{url_effective}' "$LATEST_URL")"
          echo "Resolved URL: $RESOLVED"
          # Extract version from filename, e.g. Claude-1.1.8629.dmg → 1.1.8629
          VERSION="$(basename "$RESOLVED" .dmg | sed 's/^Claude-//')"
          if [[ -z "$VERSION" || "$VERSION" == "latest" ]]; then
            echo "ERROR: Could not extract version from redirect URL: $RESOLVED"
            exit 1
          fi
          echo "Upstream version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get latest release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG="$(gh release view --repo "${{ github.repository }}" \
            --json tagName --jq '.tagName' 2>/dev/null || echo '')"
          echo "Latest release tag: ${LATEST_TAG:-none}"
          # Strip leading 'v' for comparison.
          echo "tag=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger build if version is newer
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.version.outputs.version }}
          RELEASED: ${{ steps.release.outputs.tag }}
        run: |
          if [[ "$UPSTREAM" == "$RELEASED" ]]; then
            echo "Already at latest version ($UPSTREAM). No build needed."
            exit 0
          fi
          echo "New version found: $UPSTREAM (released: ${RELEASED:-none})"
          gh workflow run build.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            --field version="$UPSTREAM"
          echo "Triggered build.yml for version $UPSTREAM."
