name: Check for Claude Desktop Update

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write          # needed to trigger build.yml via workflow_dispatch

    steps:
      - name: Resolve latest DMG version
        id: version
        run: |
          LATEST_URL="https://storage.googleapis.com/osprey-downloads-c02f6a0d-347c-492b-a752-3e0651722e97/nest-apple/Claude-latest.dmg"
          VERSION=""

          # Strategy 1: Follow redirects with a GET request (range 0-0 to
          # avoid downloading the full file) and check the effective URL.
          RESOLVED="$(curl -sSL -o /dev/null -w '%{url_effective}' -r 0-0 "$LATEST_URL" 2>/dev/null || true)"
          echo "Resolved URL (GET range): ${RESOLVED:-empty}"
          if [[ -n "$RESOLVED" ]]; then
            VERSION="$(basename "$RESOLVED" .dmg | sed 's/^Claude-//')"
          fi

          # Strategy 2: Parse the Location header from redirect responses.
          if [[ -z "$VERSION" || "$VERSION" == "latest" || "$VERSION" == "Claude-latest" ]]; then
            HEADERS="$(curl -sIL "$LATEST_URL" 2>/dev/null || true)"
            LOCATION="$(echo "$HEADERS" | grep -i '^location:' | tail -1 | tr -d '\r' | awk '{print $2}')"
            echo "Location header: ${LOCATION:-empty}"
            if [[ -n "$LOCATION" ]]; then
              VERSION="$(basename "$LOCATION" .dmg | sed 's/^Claude-//')"
            fi
          fi

          # Strategy 3: Check Content-Disposition header for the filename.
          if [[ -z "$VERSION" || "$VERSION" == "latest" || "$VERSION" == "Claude-latest" ]]; then
            HEADERS="$(curl -sI "$LATEST_URL" 2>/dev/null || true)"
            CD="$(echo "$HEADERS" | grep -i '^content-disposition:' | tr -d '\r')"
            echo "Content-Disposition: ${CD:-empty}"
            if [[ -n "$CD" ]]; then
              FNAME="$(echo "$CD" | grep -oP 'filename="?\K[^";]+' || true)"
              if [[ -n "$FNAME" ]]; then
                VERSION="$(basename "$FNAME" .dmg | sed 's/^Claude-//')"
              fi
            fi
          fi

          # Validate: version must be a dotted number like 1.1.8629.
          if [[ -z "$VERSION" || ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Could not resolve a valid version from $LATEST_URL"
            echo "  Last resolved version string: '${VERSION:-}'"
            exit 1
          fi

          echo "Upstream version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get latest release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG="$(gh release view --repo "${{ github.repository }}" \
            --json tagName --jq '.tagName' 2>/dev/null || echo '')"
          echo "Latest release tag: ${LATEST_TAG:-none}"
          # Strip leading 'v' for comparison.
          echo "tag=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger build if version is newer
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: ${{ steps.version.outputs.version }}
          RELEASED: ${{ steps.release.outputs.tag }}
        run: |
          if [[ "$UPSTREAM" == "$RELEASED" ]]; then
            echo "Already at latest version ($UPSTREAM). No build needed."
            exit 0
          fi
          echo "New version found: $UPSTREAM (released: ${RELEASED:-none})"
          gh workflow run build.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            --field version="$UPSTREAM"
          echo "Triggered build.yml for version $UPSTREAM."
